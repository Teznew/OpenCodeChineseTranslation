name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g., v8.1.0)'
        required: true
        type: string
      upstream_tag:
        description: 'Upstream release tag (e.g., v1.14.28). If blank, defaults to latest formal release.'
        required: false
        type: string

permissions:
  contents: write

env:
  # 使用手动输入或 git tag
  TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}
  # 上游 OpenCode 仓库信息
  UPSTREAM_REPO: anomalyco/opencode
  UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag }}

jobs:
  build-cli:
    name: Build CLI Tool
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: linux
            arch: amd64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli-go/go.mod
          cache-dependency-path: cli-go/go.sum

      - name: Build CLI
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0  # 禁用 CGO 以实现静态链接，解决 GLIBC 兼容性问题
        run: |
          cd cli-go
          go build -ldflags="-s -w" -o ../dist/opencode-cli-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} .

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*

  build-opencode:
    name: Build OpenCode Chinese
    runs-on: ubuntu-latest
    needs: build-cli  # 需要先编译 CLI
    outputs:
      upstream_tag: ${{ steps.resolve.outputs.upstream_tag }}
    strategy:
      matrix:
        include:
          - platform: windows-x64
            bun_target: bun-windows-x64
          - platform: linux-x64
            bun_target: bun-linux-x64
          - platform: darwin-x64
            bun_target: bun-darwin-x64
          - platform: darwin-arm64
            bun_target: bun-darwin-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli-go/go.mod
          cache-dependency-path: cli-go/go.sum

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Build CLI for current platform
        run: |
          cd cli-go
          go build -o ../opencode-cli .

      - name: Resolve upstream source tag
        id: resolve
        run: |
          INPUT_UPSTREAM_TAG="${{ env.UPSTREAM_TAG }}"

          if [ -n "$INPUT_UPSTREAM_TAG" ]; then
            echo "Using provided upstream tag: $INPUT_UPSTREAM_TAG"
            echo "upstream_tag=$INPUT_UPSTREAM_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "No upstream tag provided, fetching latest release..."
            RESPONSE=$(curl -fsSL "https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest")
            LATEST_TAG=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])' <<< "$RESPONSE")

            if [ -z "$LATEST_TAG" ]; then
              echo "Failed to resolve upstream release tag" >&2
              exit 1
            fi

            echo "Resolved latest release tag: $LATEST_TAG"
            echo "upstream_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone OpenCode source
        run: |
          UPSTREAM_TAG="${{ steps.resolve.outputs.upstream_tag }}"
          echo "Cloning with upstream tag: $UPSTREAM_TAG"
          git clone --depth 1 --branch $UPSTREAM_TAG https://github.com/anomalyco/opencode.git opencode-zh-CN

      - name: Apply Chinese translation
        env:
          OPENCODE_SOURCE_DIR: ${{ github.workspace }}/opencode-zh-CN
        run: |
          ./opencode-cli apply

      - name: Build OpenCode
        env:
          OPENCODE_SOURCE_DIR: ${{ github.workspace }}/opencode-zh-CN
        run: |
          ./opencode-cli build --platform ${{ matrix.platform }} --deploy=false

      - name: Package
        run: |
          VERSION=${{ env.TAG_NAME }}
          PLATFORM=${{ matrix.platform }}
          PACKAGE_NAME="opencode-zh-CN-${VERSION}-${PLATFORM}"
          
          echo "=== Packaging ${PACKAGE_NAME} ==="
          
          # 构建产物的实际路径
          # opencode-zh-CN/packages/opencode/dist/opencode-{platform}/bin/
          BUILD_DIR="opencode-zh-CN/packages/opencode/dist/opencode-${PLATFORM}/bin"
          
          echo "Looking for build artifacts in: ${BUILD_DIR}"
          ls -la ${BUILD_DIR}/ || echo "Build dir not found"
          
          # 确保输出目录存在
          mkdir -p dist
          
          # 检查构建产物并打包
          if [ "$PLATFORM" == "windows-x64" ]; then
            BINARY="${BUILD_DIR}/opencode.exe"
          else
            BINARY="${BUILD_DIR}/opencode"
          fi
          
          if [ -f "$BINARY" ]; then
            zip -j dist/${PACKAGE_NAME}.zip "$BINARY"
            echo "✓ Created dist/${PACKAGE_NAME}.zip"
            ls -la dist/
          else
            echo "❌ Binary not found: $BINARY"
            echo "=== Searching for opencode binaries ==="
            find opencode-zh-CN -name "opencode*" -type f 2>/dev/null | head -20
            exit 1
          fi

      - name: Upload OpenCode Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-${{ matrix.platform }}
          path: dist/*.zip

  release:
    name: Create GitHub Release
    needs: [build-cli, build-opencode]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Build Timestamp
        id: date
        env:
          TZ: 'Asia/Shanghai'
        run: echo "timestamp=$(date +'%Y-%m-%d %H:%M CST')" >> $GITHUB_OUTPUT

      - name: Download CLI Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: dist
          merge-multiple: true

      - name: Download OpenCode Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: opencode-*
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find dist -type f -name "*.zip" -o -name "*.exe" -o -name "opencode-cli-*" | head -50
          ls -la dist/ || true

      - name: Package i18n tool
        run: |
          VERSION=${{ env.TAG_NAME }}
          zip -r dist/opencode-i18n-tool-${VERSION}.zip \
            cli-go/ \
            install.ps1 \
            install.sh \
            README.md \
            CHANGELOG.md \
            -x "cli-go/.git/*" \
            -x "*.exe"

      - name: Generate Release Notes
        run: |
          VERSION=${{ env.TAG_NAME }}
          UPSTREAM_TAG="${{ needs.build-opencode.outputs.upstream_tag }}"
          TIMESTAMP="${{ steps.date.outputs.timestamp }}"
          
          cat > release_notes.md << EOF
          ## OpenCode 中文汉化版 ${{ env.TAG_NAME }}
          
          > 🕒 **更新时间**: ${TIMESTAMP}
          > 🏷️ **仓库 Release Tag**: $VERSION
          > 🔗 **上游源码 Tag**: $UPSTREAM_TAG
           
          ### 📦 版本映射
           
          | 类型 | Tag |
          |------|-----|
          | 本仓库 Release | $VERSION |
          | 上游源码 Release | $UPSTREAM_TAG |
          
          ### 📦 下载说明
          
          | 平台 | 管理工具 (CLI) | 汉化版 OpenCode |
          |------|----------------|-----------------|
          | Windows x64 | \`opencode-cli-windows-amd64.exe\` | \`opencode-zh-CN-${VERSION}-windows-x64.zip\` |
          | macOS Apple Silicon | \`opencode-cli-darwin-arm64\` | \`opencode-zh-CN-${VERSION}-darwin-arm64.zip\` |
          | macOS Intel | \`opencode-cli-darwin-amd64\` | \`opencode-zh-CN-${VERSION}-darwin-x64.zip\` |
          | Linux x64 | \`opencode-cli-linux-amd64\` | \`opencode-zh-CN-${VERSION}-linux-x64.zip\` |
          
          ### 🚀 快速安装
          
          **Windows (PowerShell)**
          \`\`\`powershell
          powershell -c "irm https://gh-proxy.com/https://raw.githubusercontent.com/Teznew/OpenCodeChineseTranslation/refs/heads/main/install.ps1 | iex"
          \`\`\`
          
          **Linux / macOS**
          \`\`\`bash
          curl -fsSL https://gh-proxy.com/https://raw.githubusercontent.com/Teznew/OpenCodeChineseTranslation/refs/heads/main/install.sh | bash
          \`\`\`
          
          ### 📝 更新日志
          
          本仓库发布标签 **$VERSION** 对应的上游源码标签为 **$UPSTREAM_TAG**，本汉化版基于该上游正式版构建。
          详细更新日志详见 [CHANGELOG.md](https://gh-proxy.com/https://github.com/Teznew/OpenCodeChineseTranslation/blob/main/CHANGELOG.md)
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "OpenCode 中文汉化版 ${{ env.TAG_NAME }} (${{ steps.date.outputs.timestamp }})"
          body_path: release_notes.md
          files: |
            dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
