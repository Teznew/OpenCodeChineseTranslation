name: Nightly Build

on:
  push:
    paths:
      - '.github/workflows/nightly.yml'
  schedule:
    # 每天 01:16 检测一次上游更新
    - cron: '16 1 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建（跳过发布标签检测）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  UPSTREAM_REPO: anomalyco/opencode

jobs:
  check-upstream:
    name: Check Upstream Updates
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      upstream_tag: ${{ steps.check.outputs.upstream_tag }}
      upstream_tag_full: ${{ steps.check.outputs.upstream_tag_full }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
      upstream_date: ${{ steps.check.outputs.upstream_date }}
      commit_count: ${{ steps.check.outputs.commit_count }}
      changelog: ${{ steps.check.outputs.changelog }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for upstream updates
        id: check
        run: |
          echo "=== Checking upstream updates ==="

          API_RESPONSE=$(curl -fsSL "https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest")
          RELEASE_FIELDS=$(API_RESPONSE="$API_RESPONSE" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["API_RESPONSE"])
          tag = payload.get("tag_name", "")
          published_at = payload.get("published_at", "")
          target_commitish = payload.get("target_commitish", "")
          normalized = tag[1:] if tag.startswith("v") else tag
          print(tag)
          print(normalized)
          print(published_at)
          print(target_commitish)
          PY
          )
          UPSTREAM_TAG_FULL=$(printf '%s\n' "$RELEASE_FIELDS" | sed -n '1p')
          UPSTREAM_VERSION=$(printf '%s\n' "$RELEASE_FIELDS" | sed -n '2p')
          UPSTREAM_DATE=$(printf '%s\n' "$RELEASE_FIELDS" | sed -n '3p')
          TARGET_COMMITISH=$(printf '%s\n' "$RELEASE_FIELDS" | sed -n '4p')

          if [ -z "$UPSTREAM_TAG_FULL" ] || [ -z "$UPSTREAM_VERSION" ]; then
            echo "GitHub Releases API did not return a valid tag"
            exit 1
          fi

          echo "Latest upstream tag: $UPSTREAM_TAG_FULL"
          echo "Normalized upstream version: $UPSTREAM_VERSION"
          echo "Upstream release published at: $UPSTREAM_DATE"

          # 保留上游 fetch 步骤用于日志和 changelog 生成，不参与是否构建的判断
          UPSTREAM_SHA=$(git ls-remote https://github.com/${{ env.UPSTREAM_REPO }}.git "refs/tags/${UPSTREAM_TAG_FULL}^{}" | cut -f1)
          if [ -z "$UPSTREAM_SHA" ] && [ -n "$TARGET_COMMITISH" ]; then
            UPSTREAM_SHA="$TARGET_COMMITISH"
          fi
          echo "Upstream SHA: $UPSTREAM_SHA"

          # 读取上次构建的发布标签
          LAST_STATE=""
          if [ -f ".nightly-state" ]; then
            IFS= read -r LAST_STATE < .nightly-state || true
            LAST_STATE=$(printf '%s' "$LAST_STATE" | tr -d '\r')
            echo "Last build state: $LAST_STATE"
          else
            echo "No previous build state found"
          fi

          SHOULD_BUILD="false"
          COMMIT_COUNT=0
          CHANGELOG=""
          STATE_KIND="missing"

          if printf '%s' "$LAST_STATE" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            STATE_KIND="tag"
          elif [ -n "$LAST_STATE" ]; then
            STATE_KIND="legacy"
          fi

          if [ "${{ github.event.inputs.force_build }}" == "true" ]; then
            echo "Force build requested"
            SHOULD_BUILD="true"
          elif [ "$STATE_KIND" = "missing" ]; then
            echo "First nightly build"
            SHOULD_BUILD="true"
          elif [ "$STATE_KIND" = "legacy" ]; then
            echo "Legacy nightly state detected ($LAST_STATE); treating it as stale pre-tag state"
            SHOULD_BUILD="true"
          elif [ "$LAST_STATE" != "$UPSTREAM_TAG_FULL" ]; then
            echo "New upstream release detected: $LAST_STATE -> $UPSTREAM_TAG_FULL"
            SHOULD_BUILD="true"
          else
            echo "No updates detected (same release tag)"
          fi

          # 拉取 tags 生成 commit 风格 changelog，不依赖上游 dev 分支
          rm -rf /tmp/upstream
          git clone --depth 200 --no-single-branch https://github.com/${{ env.UPSTREAM_REPO }}.git /tmp/upstream 2>/dev/null || true

          if [ -d "/tmp/upstream" ]; then
            pushd /tmp/upstream >/dev/null

            git fetch --force --tags origin 2>/dev/null || true

            RESOLVED_UPSTREAM_SHA=$(git rev-list -n 1 "$UPSTREAM_TAG_FULL" 2>/dev/null || true)
            if [ -n "$RESOLVED_UPSTREAM_SHA" ]; then
              UPSTREAM_SHA="$RESOLVED_UPSTREAM_SHA"
            fi

            if [ "$SHOULD_BUILD" = "true" ]; then
              if [ "$STATE_KIND" = "tag" ]; then
                COMMIT_COUNT=$(git rev-list --count "$LAST_STATE..$UPSTREAM_TAG_FULL" 2>/dev/null || echo "0")
                CHANGELOG=$(git log "$LAST_STATE..$UPSTREAM_TAG_FULL" --format="- %s (\`%h\`)" | head -50)
              else
                COMMIT_COUNT=$(git log -20 --format='%H' "$UPSTREAM_TAG_FULL" | wc -l | tr -d ' ')
                CHANGELOG=$(git log -20 --format="- %s (\`%h\`)" "$UPSTREAM_TAG_FULL")
              fi
            fi

            popd >/dev/null
          fi

          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "upstream_tag=$UPSTREAM_TAG_FULL" >> $GITHUB_OUTPUT
          echo "upstream_tag_full=$UPSTREAM_TAG_FULL" >> $GITHUB_OUTPUT
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "upstream_date=$UPSTREAM_DATE" >> $GITHUB_OUTPUT
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "upstream_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          
          # Changelog 可能很长，使用多行输出
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "=== Check complete ==="
          echo "Should build: $SHOULD_BUILD"

  build-cli:
    name: Build CLI Tool
    runs-on: ubuntu-latest
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: linux
            arch: amd64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli-go/go.mod

      - name: Build CLI
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          cd cli-go
          go build -ldflags="-s -w" -o ../dist/opencode-cli-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} .

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*

  build-opencode:
    name: Build OpenCode Chinese
    runs-on: ubuntu-latest
    needs: [check-upstream, build-cli]
    if: needs.check-upstream.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - platform: windows-x64
            bun_target: bun-windows-x64
          - platform: linux-x64
            bun_target: bun-linux-x64
          - platform: darwin-x64
            bun_target: bun-darwin-x64
          - platform: darwin-arm64
            bun_target: bun-darwin-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli-go/go.mod

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Build CLI for current platform
        run: |
          cd cli-go
          go build -o ../opencode-cli .

      - name: Clone OpenCode source
        run: |
          git clone --depth 1 --branch ${{ needs.check-upstream.outputs.upstream_tag_full }} https://github.com/${{ env.UPSTREAM_REPO }}.git opencode-zh-CN

      - name: Apply Chinese translation
        env:
          OPENCODE_SOURCE_DIR: ${{ github.workspace }}/opencode-zh-CN
        run: |
          ./opencode-cli apply

      - name: Build OpenCode
        env:
          OPENCODE_SOURCE_DIR: ${{ github.workspace }}/opencode-zh-CN
        run: |
          echo "=== Build Environment ==="
          echo "Platform: ${{ matrix.platform }}"
          echo "OPENCODE_SOURCE_DIR: $OPENCODE_SOURCE_DIR"
          echo "Bun version: $(bun --version)"
          echo ""
          echo "=== Upstream repo structure ==="
          ls -la opencode-zh-CN/ || true
          ls -la opencode-zh-CN/packages/ || true
          echo ""
          echo "=== Starting build ==="
          ./opencode-cli build --platform ${{ matrix.platform }} --deploy=false
          echo ""
          echo "=== Post-build: dist directory ==="
          find opencode-zh-CN/packages/opencode/dist -type f 2>/dev/null | head -30 || echo "dist directory not found"

      - name: Package
        env:
          NIGHTLY_DATE: ${{ needs.check-upstream.outputs.upstream_date }}
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
        run: |
          VERSION="$UPSTREAM_VERSION"
          if [ -z "$VERSION" ]; then
            echo "Missing upstream version"
            exit 1
          fi
          PLATFORM=${{ matrix.platform }}
          PACKAGE_NAME="opencode-zh-CN-${VERSION}-${PLATFORM}"
          
          echo "=== Packaging ${PACKAGE_NAME} ==="
          
          BUILD_DIR="opencode-zh-CN/packages/opencode/dist/opencode-${PLATFORM}/bin"
          
          echo "Looking for build artifacts in: ${BUILD_DIR}"
          ls -la ${BUILD_DIR}/ || echo "Build dir not found"
          
          mkdir -p dist
          
          if [ "$PLATFORM" == "windows-x64" ]; then
            BINARY="${BUILD_DIR}/opencode.exe"
          else
            BINARY="${BUILD_DIR}/opencode"
          fi
          
          if [ -f "$BINARY" ]; then
            zip -j dist/${PACKAGE_NAME}.zip "$BINARY"
            echo "✓ Created dist/${PACKAGE_NAME}.zip"
            ls -la dist/
          else
            echo "❌ Binary not found: $BINARY"
            find opencode-zh-CN -name "opencode*" -type f 2>/dev/null | head -20
            exit 1
          fi

      - name: Upload OpenCode Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-${{ matrix.platform }}
          path: dist/*.zip

  release:
    name: Create/Update Nightly Release
    needs: [check-upstream, build-cli, build-opencode]
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download CLI Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: dist
          merge-multiple: true

      - name: Download OpenCode Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: opencode-*
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find dist -type f | head -50
          ls -la dist/ || true

      - name: Package i18n tool
        env:
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
        run: |
          if [ -z "$UPSTREAM_VERSION" ]; then
            echo "Missing upstream version"
            exit 1
          fi

          zip -r dist/opencode-i18n-tool-${UPSTREAM_VERSION}.zip \
            cli-go/ \
            install.ps1 \
            install.sh \
            README.md \
            CHANGELOG.md \
            -x "cli-go/.git/*" \
            -x "*.exe"

      - name: Generate Release Notes
        env:
          NIGHTLY_DATE: ${{ needs.check-upstream.outputs.upstream_date }}
          UPSTREAM_SHA: ${{ needs.check-upstream.outputs.upstream_sha }}
          UPSTREAM_TAG_FULL: ${{ needs.check-upstream.outputs.upstream_tag_full }}
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
          COMMIT_COUNT: ${{ needs.check-upstream.outputs.commit_count }}
          CHANGELOG: ${{ needs.check-upstream.outputs.changelog }}
        run: |
          cat > release_notes.md << 'EOF'
          ## 🌙 Nightly Build - 自动跟进上游更新
          
          > ⚠️ **警告**: 这是自动构建版本，可能包含未经充分测试的功能，不建议在生产环境使用。
          > 如需稳定版本，请前往 [Releases](https://gh-proxy.com/https://github.com/Teznew/OpenCodeChineseTranslation/releases) 页面下载正式版。
          
          ---
          
          ### 📊 构建信息
          
          | 项目 | 值 |
          |------|-----|
          EOF
          
          echo "| 上游 Release Tag | [\`${UPSTREAM_TAG_FULL}\`](https://gh-proxy.com/https://github.com/${{ env.UPSTREAM_REPO }}/releases/tag/${UPSTREAM_TAG_FULL}) |" >> release_notes.md
          echo "| 上游 Commit | [\`${UPSTREAM_SHA:0:8}\`](https://gh-proxy.com/https://github.com/${{ env.UPSTREAM_REPO }}/commit/$UPSTREAM_SHA) |" >> release_notes.md
          echo "| 上游版本 | \`${UPSTREAM_VERSION}\` |" >> release_notes.md
          echo "| 构建版本 | \`opencode-zh-CN-${UPSTREAM_VERSION}\` |" >> release_notes.md
          echo "| 本次包含 Commits | ${COMMIT_COUNT:-unknown} |" >> release_notes.md
          echo "| 上游发布时间 | \`${NIGHTLY_DATE}\` |" >> release_notes.md
          echo "| 构建时间 | $(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M CST") |" >> release_notes.md
          
          cat >> release_notes.md << EOF
          
          ---
          
          ### 📦 下载
          
            | 平台 | 管理工具 (CLI) | 汉化版 OpenCode |
            |------|----------------|-----------------|
            | Windows x64 | `opencode-cli-windows-amd64.exe` | `opencode-zh-CN-${UPSTREAM_VERSION}-windows-x64.zip` |
            | macOS Apple Silicon | `opencode-cli-darwin-arm64` | `opencode-zh-CN-${UPSTREAM_VERSION}-darwin-arm64.zip` |
            | macOS Intel | `opencode-cli-darwin-amd64` | `opencode-zh-CN-${UPSTREAM_VERSION}-darwin-x64.zip` |
            | Linux x64 | `opencode-cli-linux-amd64` | `opencode-zh-CN-${UPSTREAM_VERSION}-linux-x64.zip` |
           
           ---
           
           ### 📝 OpenCode 官方更新日志
           
          以下是本次构建包含的上游更新：
          
          EOF
          
          if [ -n "$CHANGELOG" ]; then
            echo "$CHANGELOG" >> release_notes.md
          else
            echo "_无法获取更新日志_" >> release_notes.md
          fi
          
          cat >> release_notes.md << 'EOF'
          
          ---
          
           ### 🔄 自动更新机制
           
           - **检测频率**: 每天 01:16 检测一次上游更新
           - **触发条件**: 上游发布新的正式 Release tag 时自动构建
           - **更新方式**: 固定 `nightly` tag，每次构建覆盖更新
           
           > 💡 此 Release 会持续更新，下载链接始终指向最新构建。
          EOF
          
          echo "=== Generated Release Notes ==="
          cat release_notes.md

      - name: Delete old nightly release
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 0
          delete_tag_pattern: nightly
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "🌙 Nightly Build (自动更新)"
          body_path: release_notes.md
          files: |
            dist/*
          draft: false
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update nightly state
        env:
          UPSTREAM_TAG_FULL: ${{ needs.check-upstream.outputs.upstream_tag_full }}
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
        run: |
          echo "$UPSTREAM_TAG_FULL" > .nightly-state
          echo "Updated .nightly-state with tag: $UPSTREAM_TAG_FULL"
          
          # 提交状态文件
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .nightly-state
          git commit -m "chore: update nightly build state [skip ci]

          Upstream release: ${UPSTREAM_TAG_FULL}
          Version: ${UPSTREAM_VERSION}" || echo "No changes to commit"
          git push || echo "Push failed, state will be updated on next run"

  notify-skip:
    name: Report Skip Reason
    runs-on: ubuntu-latest
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build != 'true'
    steps:
      - name: Report status
        env:
          UPSTREAM_TAG_FULL: ${{ needs.check-upstream.outputs.upstream_tag_full }}
        run: |
          echo "=== Nightly Build Skipped ==="
          echo "Reason: No updates detected (same release tag)"
          echo "Current release tag: ${UPSTREAM_TAG_FULL}"
          echo ""
          echo "Build will trigger when upstream publishes a different release tag."
          echo "You can also manually trigger with 'force_build=true' to skip this check."
